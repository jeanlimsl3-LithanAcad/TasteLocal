{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h1>Book Experience</h1>
    <p class="text-muted">
        You are booking: <strong>{{ experience.title }}</strong>
    </p>

    <div class="row mt-4">
        <div class="col-lg-6">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.booking_date.id_for_label }}" class="form-label">
                        Booking Date
                    </label>
                    {{ form.booking_date }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.number_of_guests.id_for_label }}" class="form-label">
                        Number of Guests
                    </label>
                    {{ form.number_of_guests }}
                </div>

                <button type="submit" class="btn book-btn btn-lg">
                    Confirm Booking
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
